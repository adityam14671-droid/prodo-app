
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #F8F6F2;
  color: #111;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
  padding-bottom: 100px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 16px;
  border: 1px solid #eee;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  margin-bottom: 16px;
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: #111;
  color: white;
}

.gold {
  background: #D4AF37;
  color: black;
  margin-top: 10px;
}

.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 400px;
  margin: auto;
  display: flex;
  justify-content: space-around;
  background: white;
  border-top: 1px solid #eee;
  padding: 10px 0;
}

.nav button {
  border: none;
  background: none;
  font-size: 12px;
  cursor: pointer;
}

.screen { display: none; }
.active { display: block; }
</style>
</head>

<body>

<div class="container">

<!-- HOME -->
<div id="home" class="screen active">
  <h1>Good Morning</h1>

  <div class="card">
    <b>Score</b>
    <h1 id="score">0</h1>
  </div>

  <div class="card">
    <b>Streak</b>
    <h1 id="streak">0 🔥</h1>
  </div>

  <button class="btn primary" onclick="goAI()">What should I do?</button>
</div>

<!-- AI -->
<div id="ai" class="screen">
  <h1>AI</h1>
  <div class="card">
    <p id="aiText">Loading...</p>
  </div>
  <button class="btn primary" onclick="goHome()">Done</button>
</div>

<!-- HABITS -->
<div id="habits" class="screen">
  <h1>Habits</h1>

  <div class="card">
    <input id="newHabit" placeholder="Add habit"
    style="width:100%; padding:10px; margin-bottom:10px;">

    <button class="btn gold" onclick="addHabit()">+ Add</button>

    <div id="habitList"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <h1>History</h1>
  <div class="card" id="historyList">No data yet</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">🏠<br>Home</button>
  <button onclick="show('ai')">🧠<br>AI</button>
  <button onclick="show('habits')">✅<br>Habits</button>
  <button onclick="show('history')">📊<br>History</button>
</div>

<script>

// DATA
let customHabits = JSON.parse(localStorage.getItem("customHabits")) || [];

let streakData = JSON.parse(localStorage.getItem("streakData")) || {
  streak: 0,
  lastDate: null
};

let lastResetDate = localStorage.getItem("lastResetDate");

// DATE
function getToday() {
  return new Date().toDateString();
}

// RESET DAILY
function resetHabitsIfNewDay() {
  const today = getToday();

  if (lastResetDate !== today) {
    customHabits = customHabits.map(h => ({ ...h, done: false }));
    localStorage.setItem("customHabits", JSON.stringify(customHabits));
    localStorage.setItem("lastResetDate", today);
    lastResetDate = today;
  }
}

// NAVIGATION
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if (id === 'habits') renderHabits();
  if (id === 'history') renderHistory();
}

// AI
function goAI() {
  let msg = "Start working";

  const pending = customHabits.find(h => !h.done);

  if (pending) msg = "Do this: " + pending.name;
  else if (customHabits.length) msg = "All done";

  document.getElementById("aiText").innerText = msg;
  show('ai');
}

function goHome() {
  show('home');
  updateScore();
}

// HABITS
function addHabit() {
  const input = document.getElementById("newHabit");
  if (!input.value.trim()) return;

  customHabits.push({ name: input.value, done: false });
  localStorage.setItem("customHabits", JSON.stringify(customHabits));

  input.value = "";
  renderHabits();
}

function toggleHabit(i) {
  customHabits[i].done = !customHabits[i].done;

  localStorage.setItem("customHabits", JSON.stringify(customHabits));

  updateScore();
  updateStreak();
  saveDailyHistory(); // FIXED
}

function renderHabits() {
  const list = document.getElementById("habitList");
  list.innerHTML = "";

  customHabits.forEach((h, i) => {
    list.innerHTML += `
      <label>
        <input type="checkbox" ${h.done ? "checked" : ""}
        onclick="toggleHabit(${i})">
        ${h.name}
      </label><br><br>
    `;
  });
}

// SCORE
function calculateScore() {
  let score = 0;
  customHabits.forEach(h => { if (h.done) score += 20; });
  return Math.min(score, 100);
}

function updateScore() {
  document.getElementById("score").innerText = calculateScore();
}

// STREAK
function updateStreak() {
  const today = getToday();

  const anyDone = customHabits.some(h => h.done);
  if (!anyDone) return;

  if (streakData.lastDate === today) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);

  if (streakData.lastDate === yesterday.toDateString()) {
    streakData.streak += 1;
  } else {
    streakData.streak = 1;
  }

  streakData.lastDate = today;

  localStorage.setItem("streakData", JSON.stringify(streakData));

  displayStreak();
}

function displayStreak() {
  document.getElementById("streak").innerText = streakData.streak + " 🔥";
}

// HISTORY
function saveDailyHistory() {
  const today = getToday();
  let history = JSON.parse(localStorage.getItem("history")) || [];

  const index = history.findIndex(h => h.date === today);

  const data = {
    date: today,
    score: calculateScore(),
    streak: streakData.streak
  };

  if (index !== -1) {
    history[index] = data;
  } else {
    history.push(data);
  }

  localStorage.setItem("history", JSON.stringify(history));
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history")) || [];
  const container = document.getElementById("historyList");

  if (!history.length) {
    container.innerHTML = "No data yet";
    return;
  }

  container.innerHTML = "";

  history.slice().reverse().forEach(h => {
    container.innerHTML += `
      <div>
        <b>${h.date}</b><br>
        Score: ${h.score} | Streak: ${h.streak} 🔥
      </div><br>
    `;
  });
}

// INIT
window.onload = function() {
  resetHabitsIfNewDay();
  renderHabits();
  updateScore();
  displayStreak();
};

</script>

<script src="script.js"></script>

</body>
</html>
